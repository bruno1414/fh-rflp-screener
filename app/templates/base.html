<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FH RFLP Screener{% endblock %}</title>
    <meta name="google-site-verification" content="zKMtYmHKiSTicUaskeDE8OSdW7k9uhKwtdjYDS4ouPE" />
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-2: #111827;
            --border: #334155;
            --text: #e2e8f0;
            --text-strong: #f1f5f9;
            --text-muted: #94a3b8;
            --text-dim: #64748b;
            --brand: #0ea5e9;
            --brand-hover: #0284c7;
            --ring: rgba(14, 165, 233, 0.35);
            --success: #34d399;
            --danger: #fca5a5;
            --space-1: 0.25rem;
            --space-2: 0.5rem;
            --space-3: 0.75rem;
            --space-4: 1rem;
            --space-5: 1.25rem;
            --space-6: 1.5rem;
            --space-8: 2rem;
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --container: 1100px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { -webkit-text-size-adjust: 100%; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
        }

        a { color: inherit; }

        :focus-visible {
            outline: 2px solid var(--brand);
            outline-offset: 2px;
            box-shadow: 0 0 0 4px var(--ring);
            border-radius: var(--radius-sm);
        }

        /* Navigation */
        nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 var(--space-8);
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 60px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(6px);
        }

        .nav-brand {
            font-size: 1.1rem;
            font-weight: 700;
            color: #38bdf8;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: var(--space-2);
        }

        .nav-brand span {
            background: #0ea5e9;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .nav-links {
            display: flex;
            gap: var(--space-2);
            flex-wrap: wrap;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            padding: 0.4rem 0.9rem;
            border-radius: 6px;
            font-size: 1.0rem;
            transition: all 0.2s;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--text);
            background: var(--border);
        }

        /* Main content */
        main {
            max-width: var(--container);
            margin: 0 auto;
            padding: 2.5rem 1.5rem;
        }

        /* Cards */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: var(--space-6);
            margin-bottom: var(--space-6);
        }

        .card h2 {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text-strong);
            margin-bottom: var(--space-4);
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            padding: 0.55rem 1.2rem;
            border-radius: var(--radius-md);
            border: 1px solid transparent;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease, opacity 0.2s ease;
            text-decoration: none;
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--brand);
            color: white;
        }

        .btn-primary:hover { background: var(--brand-hover); }

        .btn-secondary {
            background: var(--border);
            color: var(--text);
        }

        .btn-secondary:hover { background: #475569; }

        .btn:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-excellent { background: #064e3b; color: #6ee7b7; }
        .badge-good      { background: #1e3a5f; color: #93c5fd; }
        .badge-poor      { background: #451a03; color: #fdba74; }
        .badge-ldlr      { background: #1e3a5f; color: #93c5fd; }
        .badge-apob      { background: #3b0764; color: #d8b4fe; }
        .badge-pcsk9     { background: #064e3b; color: #6ee7b7; }

        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }

        th {
            text-align: left;
            padding: 0.6rem 0.8rem;
            color: #94a3b8;
            font-weight: 500;
            border-bottom: 1px solid #334155;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        td {
            padding: 0.7rem 0.8rem;
            border-bottom: 1px solid #1e293b;
            color: #cbd5e1;
        }

        tr:hover td { background: #1e293b; }

        /* Form inputs */
        input, select {
            background: #0f172a;
            border: 1px solid #334155;
            color: #e2e8f0;
            padding: 0.55rem 0.9rem;
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
            transition: border 0.2s;
            width: 100%;
        }

        input:focus, select:focus {
            border-color: #0ea5e9;
        }

        label {
            display: block;
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 0.35rem;
            font-weight: 500;
        }

        .form-group { margin-bottom: 1rem; }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1rem;
        }

        /* Alerts */
        .alert {
            padding: 0.8rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }

        .alert-error {
            background: #450a0a;
            border: 1px solid #991b1b;
            color: #fca5a5;
        }

        .alert-success {
            background: #052e16;
            border: 1px solid #166534;
            color: #86efac;
        }

        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid #334155;
            border-top-color: #0ea5e9;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .hidden { display: none !important; }

        /* Gel image */
        .gel-container {
            background: #111827;
            border-radius: 10px;
            padding: 1rem;
            text-align: center;
        }

        .gel-container img {
            max-width: 100%;
            border-radius: 6px;
        }

        /* Score bar */
        .score-bar {
            height: 6px;
            background: #1e293b;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 4px;
        }

        .score-fill {
            height: 100%;
            background: linear-gradient(90deg, #0ea5e9, #8b5cf6);
            border-radius: 3px;
        }

        .section-header {
            margin-bottom: 1.25rem;
        }

        .section-header h1,
        .section-header h2 {
            color: #f1f5f9;
            font-weight: 700;
        }

        .section-header p {
            color: #94a3b8;
            margin-top: 0.4rem;
            line-height: 1.6;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            align-items: start;
        }

        .grid-auto {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
        }

        .table-wrap {
            width: 100%;
            overflow-x: auto;
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: #475569;
            font-size: 0.8rem;
            border-top: 1px solid #1e293b;
            margin-top: 3rem;
            line-height: 1.6;
        }

        @media (max-width: 900px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }

            nav {
                padding: 0 1rem;
            }

            main {
                padding: 1.5rem 1rem;
            }
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="nav-brand">
            FH RFLP Screener <span>v1.0</span>
        </a>
        <div class="nav-links">
            <a href="/"        id="nav-home">Home</a>
            <a href="/panel"   id="nav-panel">Panel Lookup</a>
            <a href="/analyze" id="nav-analyze">Run Analysis</a>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        FH RFLP Screener — Computational pipeline for low-cost Familial Hypercholesterolemia screening.
    </footer>

    <script>
        // Highlight active nav link
        const path = window.location.pathname;
        if (path === "/")        document.getElementById("nav-home").classList.add("active");
        if (path === "/panel")   document.getElementById("nav-panel").classList.add("active");
        if (path === "/analyze") document.getElementById("nav-analyze").classList.add("active");
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
