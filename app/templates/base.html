<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FH RFLP Screener{% endblock %}</title>
    <meta name="google-site-verification" content="zKMtYmHKiSTicUaskeDE8OSdW7k9uhKwtdjYDS4ouPE" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 
                         "Segoe UI", sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }

        /* Navigation */
        nav {
            background: #1e293b;
            border-bottom: 1px solid #334155;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-brand {
            font-size: 1.1rem;
            font-weight: 700;
            color: #38bdf8;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-brand span {
            background: #0ea5e9;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .nav-links {
            display: flex;
            gap: 0.5rem;
        }

        .nav-links a {
            color: #94a3b8;
            text-decoration: none;
            padding: 0.4rem 0.9rem;
            border-radius: 6px;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: #e2e8f0;
            background: #334155;
        }

        /* Main content */
        main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2.5rem 1.5rem;
        }

        /* Cards */
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .card h2 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #f1f5f9;
            margin-bottom: 1rem;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.55rem 1.2rem;
            border-radius: 8px;
            border: none;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .btn-primary {
            background: #0ea5e9;
            color: white;
        }

        .btn-primary:hover { background: #0284c7; }

        .btn-secondary {
            background: #334155;
            color: #e2e8f0;
        }

        .btn-secondary:hover { background: #475569; }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-excellent { background: #064e3b; color: #6ee7b7; }
        .badge-good      { background: #1e3a5f; color: #93c5fd; }
        .badge-poor      { background: #451a03; color: #fdba74; }
        .badge-ldlr      { background: #1e3a5f; color: #93c5fd; }
        .badge-apob      { background: #3b0764; color: #d8b4fe; }
        .badge-pcsk9     { background: #064e3b; color: #6ee7b7; }

        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }

        th {
            text-align: left;
            padding: 0.6rem 0.8rem;
            color: #94a3b8;
            font-weight: 500;
            border-bottom: 1px solid #334155;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        td {
            padding: 0.7rem 0.8rem;
            border-bottom: 1px solid #1e293b;
            color: #cbd5e1;
        }

        tr:hover td { background: #1e293b; }

        /* Form inputs */
        input, select {
            background: #0f172a;
            border: 1px solid #334155;
            color: #e2e8f0;
            padding: 0.55rem 0.9rem;
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
            transition: border 0.2s;
            width: 100%;
        }

        input:focus, select:focus {
            border-color: #0ea5e9;
        }

        label {
            display: block;
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 0.35rem;
            font-weight: 500;
        }

        .form-group { margin-bottom: 1rem; }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1rem;
        }

        /* Alerts */
        .alert {
            padding: 0.8rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }

        .alert-error {
            background: #450a0a;
            border: 1px solid #991b1b;
            color: #fca5a5;
        }

        .alert-success {
            background: #052e16;
            border: 1px solid #166534;
            color: #86efac;
        }

        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid #334155;
            border-top-color: #0ea5e9;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .hidden { display: none !important; }

        /* Gel image */
        .gel-container {
            background: #111827;
            border-radius: 10px;
            padding: 1rem;
            text-align: center;
        }

        .gel-container img {
            max-width: 100%;
            border-radius: 6px;
        }

        /* Score bar */
        .score-bar {
            height: 6px;
            background: #1e293b;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 4px;
        }

        .score-fill {
            height: 100%;
            background: linear-gradient(90deg, #0ea5e9, #8b5cf6);
            border-radius: 3px;
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: #475569;
            font-size: 0.8rem;
            border-top: 1px solid #1e293b;
            margin-top: 3rem;
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="nav-brand">
            FH RFLP Screener <span>v1.0</span>
        </a>
        <div class="nav-links">
            <a href="/"        id="nav-home">Home</a>
            <a href="/panel"   id="nav-panel">Panel Lookup</a>
            <a href="/analyze" id="nav-analyze">Run Analysis</a>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        FH RFLP Screener — Computational pipeline for low-cost 
        Familial Hypercholesterolemia screening
    </footer>

    <script>
        // Highlight active nav link
        const path = window.location.pathname;
        if (path === "/")        document.getElementById("nav-home").classList.add("active");
        if (path === "/panel")   document.getElementById("nav-panel").classList.add("active");
        if (path === "/analyze") document.getElementById("nav-analyze").classList.add("active");
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
